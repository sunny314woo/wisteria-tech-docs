# NexT Theme Configuration
# https://theme-next.js.org/docs/

# Scheme: Pisces — 宽侧边栏，适合技术文档导航
scheme: Pisces

# Dark Mode
darkmode: false

# Favicon
favicon:
  small: /images/favicon-16x16-next.png
  medium: /images/favicon-32x32-next.png

# Menu
menu:
  home: / || fa fa-home
  categories: /categories/ || fa fa-th
  tags: /tags/ || fa fa-tags
  archives: /archives/ || fa fa-archive
  about: /about/ || fa fa-user

menu_settings:
  icons: true
  badges: false

# ---------------------------------------------------------------
# Sidebar — 固定显示，左侧显示近期文章、分类、标签
# ---------------------------------------------------------------
sidebar:
  position: left
  # always: 所有页面固定显示侧边栏
  display: always
  padding: 18
  offset: 12
  b2t: true
  scrollpercent: true
  onmobile: false

# Recent Posts
recent_posts:
  enable: true
  title: 近期文章
  count: 20

# ---------------------------------------------------------------
# TOC — 文章内目录
# ---------------------------------------------------------------
toc:
  enable: true
  number: true
  max_depth: 3
  wrap: false

# Code block
codeblock:
  border_radius: 4
  copy_button:
    enable: true
    style: flat
  highlight_theme: atom-one-light

# Back to top
back2top:
  enable: true
  sidebar: true
  scrollpercent: true

# Reading progress
reading_progress:
  enable: false

# Bookmark
bookmark:
  enable: false

# ---------------------------------------------------------------
# 本地搜索
# ---------------------------------------------------------------
local_search:
  enable: true
  trigger: auto
  top_n_per_article: 1
  unescape: false
  preload: false

# Creative Commons
creative_commons:
  license: by-nc-sa
  sidebar: false
  post: false
  language:

# Footer
footer:
  since: 2025
  icon:
    name: fa fa-heart
    animated: false
    color: '#808080'
  powered: true
  theme:
    enable: true

# Social (不启用)
social:

social_icons:
  enable: false

# Avatar (不启用)
avatar:
  enable: false

# Tags page style
tagcloud:
  min: 12
  max: 30

# ---------------------------------------------------------------
# 动画 — 全部关闭，技术文档风格
# ---------------------------------------------------------------
motion:
  enable: false
  async: false
  transition:
    accelerate_in: false
    accelerate_out: false
    fade: false
    move: false
    scale: false
    roll: false

# Vendors
vendors:
  internal: local

# Custom file paths — inject custom Stylus + sidebar widgets
custom_file_path:
  style: source/_data/styles.styl
  sidebar: _templates/sidebar-recent-posts.njk

# Disable extras
fancybox: false
pjax: false
