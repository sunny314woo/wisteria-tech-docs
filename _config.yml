# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: Wisteria Blog
subtitle: 'AI 对话整理、导出与本地知识管理'
description: 'Wisteria Software 的 AI 对话工作流博客，分享 ChatGPT、Gemini、Outline、Inbox、本地优先归档与隐私友好的知识管理实践。'
keywords: [Wisteria, Wisteria Blog, ChatGPT, Gemini, Outline, Inbox, AI 对话, Markdown 导出, 本地优先, 知识管理]
author: Wisteria Software
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://blog.wisteriasoftware.uk
root: /
permalink: :category/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude:
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: '  '
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: '  '

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: next

# Deployment
deploy:
  type: ''
