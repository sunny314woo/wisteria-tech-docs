# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: Wisteria Tech Docs
subtitle: 技术文档与开发笔记
description: Wisteria Software 产品线的技术文档、开发笔记与产品更新日志。Local-first, privacy-friendly, technical documentation.
keywords: [Wisteria, tech-docs, outline, inbox, chrome-extension, fastapi]
author: Wisteria Software
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://docs.wisteriasoftware.uk
root: /
permalink: :category/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude:
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: '  '
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: '  '

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: next

# Deployment
deploy:
  type: ''
